---
name: E2E tests

# This workflow deploys real Azure resources.
# Credentials are gated behind the "test" environment (requires manual approval).
#
# Trigger sources
# ──────────────
# workflow_dispatch  →  reads modules from modules.yaml
# repository_dispatch →  single module from client_payload (agent-triggered)
#
# Dispatch payload (event_type: "module-e2e"):
#   {
#     "source":  "kewalaka/terraform-azurerm-avm-res-foo-bar",  // required
#     "branch":  "feature/my-fix"                               // optional
#   }
#
# Only repository_dispatch events whose source org is in ALLOWED_ORGS are accepted.
# The "test" environment gate on the e2e job provides a second layer of protection.
on:
  workflow_dispatch:
    inputs:
      module_filter:
        description: >
          Optional substring filter on the module source field
          (e.g. "managedenvironment"). Leave blank to run all modules.
        required: false
        default: ""
  repository_dispatch:
    types: [module-e2e]

jobs:
  # ── 1. Build module matrix ─────────────────────────────────────────────────
  setup:
    name: Build module matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.parse.outputs.modules }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build module matrix
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODULE_FILTER: ${{ inputs.module_filter }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 - << 'PYEOF'
          import yaml, json, os, sys

          ALLOWED_ORGS = {"kewalaka", "Azure"}

          event_name = os.environ.get("EVENT_NAME", "")

          if event_name == "repository_dispatch":
              payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))
              source = payload.get("source", "").strip()
              branch = payload.get("branch", "").strip()
              if not source:
                  print("ERROR: client_payload.source is required", file=sys.stderr)
                  sys.exit(1)
              org = source.split("/")[0] if "/" in source else ""
              if org not in ALLOWED_ORGS:
                  print(f"ERROR: source org '{org}' is not in the allowlist "
                        f"{ALLOWED_ORGS}", file=sys.stderr)
                  sys.exit(1)
              modules = [{"source": source, "branch": branch,
                          "name": source.split("/")[-1]}]
          else:
              with open("modules.yaml") as f:
                  data = yaml.safe_load(f)
              modules = data.get("modules", [])
              module_filter = os.environ.get("MODULE_FILTER", "").strip()
              if module_filter:
                  modules = [m for m in modules
                             if module_filter in m.get("source", "")]
              for m in modules:
                  if not m.get("name"):
                      m["name"] = m["source"].split("/")[-1]
                  if not m.get("branch"):
                      m["branch"] = ""

          result = json.dumps(modules)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"modules={result}\n")
          print(f"Modules to process: {result}")
          PYEOF

  # ── 2. Run e2e tests for each module ──────────────────────────────────────
  #
  # For each module this job:
  #   a) runs conftest (Open Policy Agent checks against Terraform plans)
  #   b) optionally runs examples/setup.sh
  #   c) runs `make test-example` for every example directory
  #   d) optionally runs examples/teardown.sh
  #
  e2e:
    name: ${{ matrix.module.name }}
    needs: setup
    if: needs.setup.outputs.modules != '[]'
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      fail-fast: false
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_enable_telemetry: "false"
    steps:
      - name: Checkout ${{ matrix.module.source }} (${{ matrix.module.branch || 'default branch' }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.module.source }}
          ref: ${{ matrix.module.branch }}

      # Fetches an OIDC request token that the AVM Docker container uses to
      # exchange for an Azure access token at runtime.
      - name: Obtain OIDC credential helper
        run: |
          export REMOTE_SCRIPT="https://raw.githubusercontent.com/Azure/tfmod-scaffold/main/avm_scripts"
          curl -H 'Cache-Control: no-cache, no-store' -sSL \
            "$REMOTE_SCRIPT/prepare-credential.sh" -o "$RUNNER_TEMP/prepare-credential.sh"
          source "$RUNNER_TEMP/prepare-credential.sh"
          echo "ARM_OIDC_REQUEST_TOKEN=$ARM_OIDC_REQUEST_TOKEN" >> "$GITHUB_ENV"
          echo "ARM_OIDC_REQUEST_URL=$ARM_OIDC_REQUEST_URL"   >> "$GITHUB_ENV"
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_USE_OIDC: "true"

      # ── conftest ────────────────────────────────────────────────────────────
      - name: Run conftest
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/src" -w /src \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            make conftest

      # ── global setup (if examples/setup.sh exists) ──────────────────────────
      - name: Run global setup
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          if [ ! -f examples/setup.sh ]; then
            echo "No examples/setup.sh found — skipping global setup."
            exit 0
          fi
          chmod +x examples/setup.sh
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/src" -w /src/examples \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            ./setup.sh

      # ── test each example ───────────────────────────────────────────────────
      - name: Test examples
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          # Enumerate example directories (skip directories starting with _)
          mapfile -t EXAMPLES < <(find examples -maxdepth 1 -mindepth 1 -type d \
            ! -name '_*' | sort)

          if [ ${#EXAMPLES[@]} -eq 0 ]; then
            echo "No example directories found under examples/ — nothing to test."
            exit 0
          fi

          echo "Found ${#EXAMPLES[@]} example(s): ${EXAMPLES[*]}"

          for EXAMPLE_DIR in "${EXAMPLES[@]}"; do
            EXAMPLE_NAME=$(basename "$EXAMPLE_DIR")
            echo "::group::Testing example: $EXAMPLE_NAME"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$(pwd):/src" -w /src \
              --network=host \
              -e TF_IN_AUTOMATION \
              -e TF_VAR_enable_telemetry \
              -e AVM_MOD_PATH=/src \
              -e AVM_EXAMPLE="$EXAMPLE_NAME" \
              -e ARM_SUBSCRIPTION_ID \
              -e ARM_TENANT_ID \
              -e ARM_CLIENT_ID \
              -e ARM_OIDC_REQUEST_TOKEN \
              -e ARM_OIDC_REQUEST_URL \
              -e ARM_USE_OIDC \
              --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
              mcr.microsoft.com/azterraform:avm-latest \
              make test-example
            echo "::endgroup::"
          done

      # ── global teardown (if examples/teardown.sh exists) ───────────────────
      - name: Run global teardown
        if: always()
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          if [ ! -f examples/teardown.sh ]; then
            echo "No examples/teardown.sh found — skipping global teardown."
            exit 0
          fi
          chmod +x examples/teardown.sh
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/src" -w /src/examples \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            ./teardown.sh

      - name: Notify agent on completion
        if: always() && github.event_name == 'repository_dispatch'
        env:
          CALLBACK_REPO: ${{ github.event.client_payload.callback_repo }}
          AGENT_DISPATCH_TOKEN: ${{ secrets.AGENT_DISPATCH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          MODULE: ${{ matrix.module.source }}
          BRANCH: ${{ matrix.module.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${CALLBACK_REPO}" ]; then
            echo "No callback_repo in payload — skipping callback"
            exit 0
          fi
          if [ -z "${AGENT_DISPATCH_TOKEN}" ]; then
            echo "AGENT_DISPATCH_TOKEN secret not set — skipping callback"
            exit 0
          fi
          payload=$(jq -n \
            --arg status  "$JOB_STATUS" \
            --arg module  "$MODULE" \
            --arg branch  "$BRANCH" \
            --arg workflow "e2e" \
            --arg run_url "$RUN_URL" \
            '{event_type: "ci-result", client_payload: {status: $status, module: $module, branch: $branch, workflow: $workflow, run_url: $run_url}}')
          curl -fsS -X POST \
            -H "Authorization: Bearer $AGENT_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CALLBACK_REPO/dispatches" \
            -d "$payload"
          echo "Notified $CALLBACK_REPO: $JOB_STATUS"
