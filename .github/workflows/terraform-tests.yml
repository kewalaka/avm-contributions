---
name: Terraform tests

# Unit tests use mocked providers and need no Azure credentials.
# Integration tests deploy real resources and require Azure OIDC credentials
# and are gated behind the "test" environment (requires manual approval).
#
# Trigger sources
# ──────────────
# push / workflow_dispatch  →  reads modules from modules.yaml
# repository_dispatch        →  single module from client_payload (agent-triggered)
#
# Dispatch payload (event_type: "module-tf-test"):
#   {
#     "source":    "kewalaka/terraform-azurerm-avm-res-foo-bar",  // required
#     "branch":    "feature/my-fix",                              // optional
#     "test_type": "unit"                                         // optional; defaults to "both"
#   }
#
# Only repository_dispatch events whose source org is in ALLOWED_ORGS are accepted for
# integration tests (which consume OIDC credentials).
on:
  push:
    branches:
      - main
    paths:
      - modules.yaml
      - .github/workflows/terraform-tests.yml
  workflow_dispatch:
    inputs:
      module_filter:
        description: >
          Optional substring filter on the module source field
          (e.g. "managedenvironment"). Leave blank to run all modules.
        required: false
        default: ""
      test_type:
        description: "Which tests to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - unit
          - integration
  repository_dispatch:
    types: [module-tf-test]

jobs:
  # ── 1. Build module matrix ─────────────────────────────────────────────────
  setup:
    name: Build module matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.parse.outputs.modules }}
      test_type: ${{ steps.parse.outputs.test_type }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build module matrix
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          MODULE_FILTER: ${{ inputs.module_filter }}
          INPUT_TEST_TYPE: ${{ inputs.test_type }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 - << 'PYEOF'
          import yaml, json, os, sys

          ALLOWED_ORGS = {"kewalaka", "Azure"}

          event_name = os.environ.get("EVENT_NAME", "")

          if event_name == "repository_dispatch":
              payload = json.loads(os.environ.get("CLIENT_PAYLOAD", "{}"))
              source = payload.get("source", "").strip()
              branch = payload.get("branch", "").strip()
              if not source:
                  print("ERROR: client_payload.source is required", file=sys.stderr)
                  sys.exit(1)
              org = source.split("/")[0] if "/" in source else ""
              if org not in ALLOWED_ORGS:
                  print(f"ERROR: source org '{org}' is not in the allowlist "
                        f"{ALLOWED_ORGS}", file=sys.stderr)
                  sys.exit(1)
              modules = [{"source": source, "branch": branch,
                          "name": source.split("/")[-1]}]
              test_type = payload.get("test_type", "both").strip() or "both"
          else:
              with open("modules.yaml") as f:
                  data = yaml.safe_load(f)
              modules = data.get("modules", [])
              module_filter = os.environ.get("MODULE_FILTER", "").strip()
              if module_filter:
                  modules = [m for m in modules
                             if module_filter in m.get("source", "")]
              for m in modules:
                  if not m.get("name"):
                      m["name"] = m["source"].split("/")[-1]
                  if not m.get("branch"):
                      m["branch"] = ""
              test_type = os.environ.get("INPUT_TEST_TYPE", "").strip() or "both"

          result = json.dumps(modules)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"modules={result}\n")
              fout.write(f"test_type={test_type}\n")
          print(f"Modules to process: {result}")
          print(f"Test type: {test_type}")
          PYEOF

  # ── 2. Unit tests (mocked providers — no Azure credentials needed) ─────────
  unit-tests:
    name: Unit — ${{ matrix.module.name }}
    needs: setup
    if: >
      needs.setup.outputs.modules != '[]' &&
      (needs.setup.outputs.test_type == 'unit' || needs.setup.outputs.test_type == 'both')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      fail-fast: false
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_enable_telemetry: "false"
    steps:
      - name: Checkout ${{ matrix.module.source }} (${{ matrix.module.branch || 'default branch' }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.module.source }}
          ref: ${{ matrix.module.branch }}

      - name: Check for unit tests
        id: check
        run: |
          if [ -d "tests/unit" ] && compgen -G "tests/unit/*.tftest.hcl" > /dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No unit test files found in tests/unit/ — skipping."
          fi

      - name: Run unit tests
        if: steps.check.outputs.has_tests == 'true'
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/src" -w /src \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            mcr.microsoft.com/azterraform:avm-latest \
            make tf-test-unit

      - name: Notify agent on completion
        if: always() && github.event_name == 'repository_dispatch'
        env:
          CALLBACK_REPO: ${{ github.event.client_payload.callback_repo }}
          AGENT_DISPATCH_TOKEN: ${{ secrets.AGENT_DISPATCH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          MODULE: ${{ matrix.module.source }}
          BRANCH: ${{ matrix.module.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${CALLBACK_REPO}" ]; then
            echo "No callback_repo in payload — skipping callback"
            exit 0
          fi
          if [ -z "${AGENT_DISPATCH_TOKEN}" ]; then
            echo "AGENT_DISPATCH_TOKEN secret not set — skipping callback"
            exit 0
          fi
          payload=$(jq -n \
            --arg status  "$JOB_STATUS" \
            --arg module  "$MODULE" \
            --arg branch  "$BRANCH" \
            --arg workflow "unit-tests" \
            --arg run_url "$RUN_URL" \
            '{event_type: "ci-result", client_payload: {status: $status, module: $module, branch: $branch, workflow: $workflow, run_url: $run_url}}')
          curl -fsS -X POST \
            -H "Authorization: Bearer $AGENT_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CALLBACK_REPO/dispatches" \
            -d "$payload"
          echo "Notified $CALLBACK_REPO: $JOB_STATUS"

  # ── 3. Integration tests (deploys real resources — needs Azure credentials) ─
  integration-tests:
    name: Integration — ${{ matrix.module.name }}
    needs: setup
    if: >
      needs.setup.outputs.modules != '[]' &&
      (needs.setup.outputs.test_type == 'integration' || needs.setup.outputs.test_type == 'both')
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
      fail-fast: false
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_enable_telemetry: "false"
    steps:
      - name: Checkout ${{ matrix.module.source }} (${{ matrix.module.branch || 'default branch' }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.module.source }}
          ref: ${{ matrix.module.branch }}

      - name: Check for integration tests
        id: check
        run: |
          if [ -d "tests/integration" ] && \
             compgen -G "tests/integration/*.tftest.hcl" > /dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No integration test files found in tests/integration/ — skipping."
          fi

      - name: Obtain OIDC credential helper
        if: steps.check.outputs.has_tests == 'true'
        run: |
          export REMOTE_SCRIPT="https://raw.githubusercontent.com/Azure/tfmod-scaffold/main/avm_scripts"
          curl -H 'Cache-Control: no-cache, no-store' -sSL \
            "$REMOTE_SCRIPT/prepare-credential.sh" -o "$RUNNER_TEMP/prepare-credential.sh"
          source "$RUNNER_TEMP/prepare-credential.sh"
          echo "ARM_OIDC_REQUEST_TOKEN=$ARM_OIDC_REQUEST_TOKEN" >> "$GITHUB_ENV"
          echo "ARM_OIDC_REQUEST_URL=$ARM_OIDC_REQUEST_URL"   >> "$GITHUB_ENV"
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_USE_OIDC: "true"

      - name: Run integration tests
        if: steps.check.outputs.has_tests == 'true'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/src" -w /src \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            make tf-test-integration

      - name: Notify agent on completion
        if: always() && github.event_name == 'repository_dispatch'
        env:
          CALLBACK_REPO: ${{ github.event.client_payload.callback_repo }}
          AGENT_DISPATCH_TOKEN: ${{ secrets.AGENT_DISPATCH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          MODULE: ${{ matrix.module.source }}
          BRANCH: ${{ matrix.module.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${CALLBACK_REPO}" ]; then
            echo "No callback_repo in payload — skipping callback"
            exit 0
          fi
          if [ -z "${AGENT_DISPATCH_TOKEN}" ]; then
            echo "AGENT_DISPATCH_TOKEN secret not set — skipping callback"
            exit 0
          fi
          payload=$(jq -n \
            --arg status  "$JOB_STATUS" \
            --arg module  "$MODULE" \
            --arg branch  "$BRANCH" \
            --arg workflow "integration-tests" \
            --arg run_url "$RUN_URL" \
            '{event_type: "ci-result", client_payload: {status: $status, module: $module, branch: $branch, workflow: $workflow, run_url: $run_url}}')
          curl -fsS -X POST \
            -H "Authorization: Bearer $AGENT_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CALLBACK_REPO/dispatches" \
            -d "$payload"
          echo "Notified $CALLBACK_REPO: $JOB_STATUS"
