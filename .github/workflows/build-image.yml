---
name: Build extended azterraform image

# Builds ghcr.io/kewalaka/azterraform:latest which extends the upstream
# mcr.microsoft.com/azterraform:latest with a newer porch and pwsh.
# All other CI workflows in this repo consume this image.
#
# Run this workflow manually (or merge a Dockerfile change) before running
# any checks or tests — the image must exist first.
on:
  push:
    branches:
      - main
    paths:
      - .docker/Dockerfile
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push ghcr.io/kewalaka/azterraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .docker
          push: true
          tags: |
            ghcr.io/kewalaka/azterraform:latest
            ghcr.io/kewalaka/azterraform:${{ github.sha }}
