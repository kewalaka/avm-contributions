name: Upgrade tests
run-name: >
  Upgrade ${{ github.event.client_payload.fork_repo }}
  ${{ github.event.client_payload.base_ref }}→${{ github.event.client_payload.head_ref }}

# Tests AVM module upgrades: applies the base version, upgrades to the head
# version, and verifies no breaking changes.
#
# Trigger sources
# ──────────────
# repository_dispatch  →  agent-triggered, single module
#
# Dispatch payload (event_type: "module-upgrade"):
#   {
#     "dispatch_id":   "<uuid>",                                     // required
#     "upstream_repo": "Azure/terraform-azurerm-avm-res-<resource>", // informational
#     "fork_repo":     "<owner>/terraform-azurerm-avm-res-<resource>", // required
#     "base_ref":      "v0.4.0",                                     // required
#     "head_ref":      "agent/issue-42-fix-something-abc123",        // required
#     "example":       "default",                                    // optional; blank = all
#     "apply_head":    "false",                                      // optional; default is to run (set "false" to skip)
#     "callback_repo": "<owner>/<repo>"                              // optional
#   }

on:
  repository_dispatch:
    types: [module-upgrade]

concurrency:
  group: upgrade-${{ github.event.client_payload.dispatch_id }}
  cancel-in-progress: false

jobs:
  # ── 1. Discover examples to test ──────────────────────────────────────────
  discover-examples:
    name: Discover examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      examples: ${{ steps.discover.outputs.examples }}
    steps:
      - name: Validate dispatch payload
        env:
          FORK_REPO: ${{ github.event.client_payload.fork_repo }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          BASE_REF: ${{ github.event.client_payload.base_ref }}
          HEAD_REF: ${{ github.event.client_payload.head_ref }}
        run: |
          python3 - << 'PYEOF'
          import os, sys
          ALLOWED_ORGS = {"kewalaka", "Azure"}
          errors = []
          for field in ("DISPATCH_ID", "FORK_REPO", "BASE_REF", "HEAD_REF"):
              if not os.environ.get(field, "").strip():
                  errors.append(f"client_payload.{field.lower()} is required")
          fork_repo = os.environ.get("FORK_REPO", "").strip()
          if fork_repo:
              org = fork_repo.split("/")[0] if "/" in fork_repo else ""
              if org not in ALLOWED_ORGS:
                  errors.append(f"fork_repo org '{org}' is not in allowlist {ALLOWED_ORGS}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"Payload validated: fork_repo={fork_repo}")
          PYEOF

      - name: Checkout ${{ github.event.client_payload.fork_repo }} at ${{ github.event.client_payload.head_ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.client_payload.fork_repo }}
          ref: ${{ github.event.client_payload.head_ref }}

      - name: Build example matrix
        id: discover
        env:
          EXAMPLE_INPUT: ${{ github.event.client_payload.example }}
        run: |
          python3 - << 'PYEOF'
          import json, os, glob, sys

          example_input = os.environ.get("EXAMPLE_INPUT", "").strip()
          if example_input:
              examples = [{"example": example_input}]
          else:
              found = sorted(glob.glob("examples/*/main.tf"))
              if not found:
                  print("ERROR: no examples/*/main.tf found", file=sys.stderr)
                  sys.exit(1)
              examples = [{"example": p.split("/")[1]} for p in found]

          result = json.dumps(examples)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"examples={result}\n")
          print(f"Examples to test: {result}")
          PYEOF

  # ── 2. Upgrade test for each example ──────────────────────────────────────
  upgrade-test:
    name: Upgrade — ${{ matrix.example.example }}
    needs: discover-examples
    if: needs.discover-examples.outputs.examples != '[]'
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        example: ${{ fromJson(needs.discover-examples.outputs.examples) }}
      fail-fast: false
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_enable_telemetry: "false"
      FORK_REPO: ${{ github.event.client_payload.fork_repo }}
      BASE_REF: ${{ github.event.client_payload.base_ref }}
      HEAD_REF: ${{ github.event.client_payload.head_ref }}
      EXAMPLE: ${{ matrix.example.example }}
      APPLY_HEAD: ${{ github.event.client_payload.apply_head }}
    steps:
      - name: Checkout base (${{ github.event.client_payload.base_ref }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.BASE_REF }}
          path: module-base

      - name: Checkout head (${{ github.event.client_payload.head_ref }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.HEAD_REF }}
          path: module-head

      # Fetches an OIDC request token that the AVM Docker container uses to
      # exchange for an Azure access token at runtime.
      - name: Obtain OIDC credential helper
        run: |
          export REMOTE_SCRIPT="https://raw.githubusercontent.com/Azure/tfmod-scaffold/main/avm_scripts"
          curl -H 'Cache-Control: no-cache, no-store' -sSL \
            "$REMOTE_SCRIPT/prepare-credential.sh" -o "$RUNNER_TEMP/prepare-credential.sh"
          source "$RUNNER_TEMP/prepare-credential.sh"
          echo "ARM_OIDC_REQUEST_TOKEN=$ARM_OIDC_REQUEST_TOKEN" >> "$GITHUB_ENV"
          echo "ARM_OIDC_REQUEST_URL=$ARM_OIDC_REQUEST_URL"   >> "$GITHUB_ENV"
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_USE_OIDC: "true"

      - name: Initialise summary.json
        run: |
          python3 - << 'PYEOF'
          import json, os
          summary = {
              "example":  os.environ["EXAMPLE"],
              "base_ref": os.environ["BASE_REF"],
              "head_ref": os.environ["HEAD_REF"],
              "steps": {
                  "apply_base":  "skipped",
                  "plan_a":      "skipped",
                  "plan_b":      "skipped",
                  "apply_head":  "skipped",
                  "idempotency": "skipped",
                  "destroy":     "skipped",
              },
              "breaking_changes": [],
              "plan_b_destructive_changes": [],
              "conclusion": "failure",
          }
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print("Initialised summary.json")
          PYEOF

      # ── a. Apply base ──────────────────────────────────────────────────────
      - name: Apply base (${{ env.BASE_REF }})
        id: apply_base
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-base:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            sh -c 'terraform init -input=false && terraform apply -auto-approve -input=false'

      - name: Update summary — apply_base
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.apply_base.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["apply_base"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── b. Copy state and set up upgrade workspaces ─────────────────────────
      - name: Copy terraform state to head checkout
        if: steps.apply_base.outcome == 'success'
        run: |
          STATE_SRC="module-base/examples/$EXAMPLE/terraform.tfstate"
          STATE_DST="module-head/examples/$EXAMPLE"
          mkdir -p "$STATE_DST"
          if [ -f "$STATE_SRC" ]; then
            cp "$STATE_SRC" "$STATE_DST/terraform.tfstate"
            echo "Copied terraform.tfstate to head checkout"
          else
            echo "::warning::No terraform.tfstate found after apply_base"
          fi

      # Plan A workspace: HEAD module code + BASE example configs + BASE state.
      # source = "../.." in BASE configs resolves to module-head/ root (HEAD module) ✓
      - name: Set up Plan A workspace
        if: steps.apply_base.outcome == 'success'
        run: |
          PLAN_A_DIR="module-head/examples/${EXAMPLE}_plan_a"
          mkdir -p "$PLAN_A_DIR"
          # Copy entire BASE example directory, preserving all config files
          rsync -a \
            --exclude='.terraform/' \
            --exclude='terraform.tfstate' \
            --exclude='terraform.tfstate.backup' \
            "module-base/examples/$EXAMPLE/" \
            "$PLAN_A_DIR/"
          # Overlay state from apply_base so Plan A plans against live resource state
          STATE_SRC="module-base/examples/$EXAMPLE/terraform.tfstate"
          if [ -f "$STATE_SRC" ]; then
            cp "$STATE_SRC" "$PLAN_A_DIR/terraform.tfstate"
            echo "Plan A workspace ready at $PLAN_A_DIR"
          else
            echo "::warning::No terraform.tfstate found — Plan A will plan against empty state"
          fi

      # ── c. Init upgrade workspaces ──────────────────────────────────────────
      # Plan A: HEAD module + BASE example configs (true breaking-change signal)
      - name: Init Plan A (${{ env.HEAD_REF }})
        id: init_plan_a
        if: steps.apply_base.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/${EXAMPLE}_plan_a" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform init -upgrade -input=false

      # Plan B: HEAD module + HEAD example configs (migration-path signal)
      - name: Init Plan B (${{ env.HEAD_REF }})
        id: init_head
        if: steps.apply_base.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform init -upgrade -input=false

      # ── d. Plan A — breaking change test ───────────────────────────────────
      # Uses HEAD module code with BASE example configs to simulate a user who
      # upgrades only the module version (keeps their existing configuration).
      - name: Plan A — breaking change test
        id: plan_a
        if: steps.apply_base.outcome == 'success' && steps.init_plan_a.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/${EXAMPLE}_plan_a" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform plan -no-color -detailed-exitcode -input=false \
            2>&1 | tee "module-head/examples/${EXAMPLE}_plan_a/plan_a.txt"
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          # terraform plan -detailed-exitcode: 0=no changes, 1=error, 2=changes present
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "plan_status=no_changes" >> "$GITHUB_OUTPUT"
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "plan_status=changes" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ── e. Check for breaking changes ──────────────────────────────────────
      # Both destroys and forced replacements (must be replaced) are flagged:
      # a forced recreation of a live resource breaks existing deployments.
      - name: Check for breaking changes
        if: >
          steps.plan_a.outcome == 'success' &&
          steps.plan_a.outputs.plan_status == 'changes'
        run: |
          python3 - << 'PYEOF'
          import json, re, os

          ANSI_ESCAPE = re.compile(r'\x1b\[[0-9;]*[mK]')

          def strip_ansi(text):
              return ANSI_ESCAPE.sub('', text)

          example = os.environ["EXAMPLE"]
          plan_file = f"module-head/examples/{example}_plan_a/plan_a.txt"

          breaking = []
          if os.path.exists(plan_file):
              with open(plan_file) as f:
                  content = f.read()
              lines = content.split("\n")
              for line in lines:
                  stripped = strip_ansi(line).strip()
                  # Resource will be destroyed (pure destroy)
                  if re.search(r'will be destroyed\s*$', stripped):
                      resource = stripped.lstrip("#").strip().split()[0] if stripped else "unknown"
                      breaking.append(resource)
                  # Resource must/will be replaced (forced recreation breaks existing deployments)
                  elif re.search(r'(must|will) be replaced\s*$', stripped):
                      resource = stripped.lstrip("#").strip().split()[0] if stripped else "unknown"
                      breaking.append(f"{resource} [replaced]")

          with open("summary.json") as f:
              summary = json.load(f)
          summary["breaking_changes"] = breaking
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          if breaking:
              print(f"::warning::Found {len(breaking)} breaking change(s): {breaking}")
          else:
              print("No breaking changes detected in Plan A.")
          PYEOF

      - name: Update summary — plan_a
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.plan_a.outcome }}
          PLAN_STATUS: ${{ steps.plan_a.outputs.plan_status }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          plan_status = os.environ.get("PLAN_STATUS", "")
          if outcome == "skipped":
              status = "skipped"
          elif outcome != "success":
              status = "failure"
          elif plan_status == "no_changes":
              status = "no_changes"
          else:
              status = "success"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["plan_a"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── f. Plan B — migration path ──────────────────────────────────────────
      # Uses HEAD module code with HEAD example configs. Shows whether the
      # updated example configs can apply cleanly against the live state.
      # Runs regardless of Plan A result (informational for breaking-change cases).
      - name: Plan B — migration path
        id: plan_b
        if: steps.apply_base.outcome == 'success' && steps.init_head.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform plan -no-color -detailed-exitcode -input=false \
            2>&1 | tee "module-head/examples/$EXAMPLE/plan_b.txt"
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "plan_status=no_changes" >> "$GITHUB_OUTPUT"
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "plan_status=changes" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Update summary — plan_b
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.plan_b.outcome }}
          PLAN_STATUS: ${{ steps.plan_b.outputs.plan_status }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          plan_status = os.environ.get("PLAN_STATUS", "")
          if outcome == "skipped":
              status = "skipped"
          elif outcome != "success":
              status = "failure"
          elif plan_status == "no_changes":
              status = "no_changes"
          else:
              status = "success"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["plan_b"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── g. Check for destructive changes (Plan B) ──────────────────────────
      # Flags replacements/destroys in the migration path (Plan B = HEAD module
      # + HEAD configs). Destructive here means: even following the updated
      # example configs, upgrade cannot proceed without a resource replacement.
      - name: Check for destructive changes (Plan B)
        if: >
          steps.plan_b.outcome == 'success' &&
          steps.plan_b.outputs.plan_status == 'changes'
        run: |
          python3 - << 'PYEOF'
          import json, re, os

          ANSI_ESCAPE = re.compile(r'\x1b\[[0-9;]*[mK]')

          def strip_ansi(text):
              return ANSI_ESCAPE.sub('', text)

          example = os.environ["EXAMPLE"]
          plan_file = f"module-head/examples/{example}/plan_b.txt"

          destructive = []
          if os.path.exists(plan_file):
              with open(plan_file) as f:
                  content = f.read()
              lines = content.split("\n")
              for line in lines:
                  stripped = strip_ansi(line).strip()
                  if re.search(r'will be destroyed\s*$', stripped):
                      resource = stripped.lstrip("#").strip().split()[0] if stripped else "unknown"
                      destructive.append(resource)
                  elif re.search(r'(must|will) be replaced\s*$', stripped):
                      resource = stripped.lstrip("#").strip().split()[0] if stripped else "unknown"
                      destructive.append(f"{resource} [replaced]")

          with open("summary.json") as f:
              summary = json.load(f)
          summary["plan_b_destructive_changes"] = destructive
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          if destructive:
              print(f"::warning::Plan B has {len(destructive)} destructive change(s): {destructive}")
          else:
              print("No destructive changes detected in Plan B.")
          PYEOF

      # ── h. Select upgrade path ─────────────────────────────────────────────
      # Picks Plan A (preferred: no breaking changes) or Plan B (migration path
      # is clean) or "none" (both plans have breaking/destructive changes).
      # Persists decision into summary.json and sets GITHUB_OUTPUT for later steps.
      - name: Select upgrade path
        id: select_path
        if: always() && steps.apply_base.outcome == 'success'
        run: |
          python3 - << 'PYEOF'
          import json, os

          with open("summary.json") as f:
              summary = json.load(f)

          steps_status = summary["steps"]
          example = os.environ["EXAMPLE"]

          plan_a_status = steps_status.get("plan_a", "skipped")
          plan_b_status = steps_status.get("plan_b", "skipped")
          plan_a_breaking = summary.get("breaking_changes", [])
          plan_b_destructive = summary.get("plan_b_destructive_changes", [])

          plan_a_viable = plan_a_status in ("no_changes", "success") and not plan_a_breaking
          plan_b_viable = plan_b_status in ("no_changes", "success") and not plan_b_destructive

          if plan_a_viable:
              apply_plan = "A"
              apply_example_dir = f"{example}_plan_a"
              reason = "Plan A clean — no breaking changes"
          elif plan_b_viable:
              apply_plan = "B"
              apply_example_dir = example
              reason = "Plan A has breaking changes; Plan B migration path is clean"
          else:
              apply_plan = "none"
              apply_example_dir = ""
              if plan_a_status == "skipped" and plan_b_status == "skipped":
                  reason = "Both plans skipped"
              else:
                  reason = "Both Plan A and Plan B have breaking or destructive changes"

          summary["selected_upgrade_path"] = apply_plan
          summary["selected_apply_example_dir"] = apply_example_dir
          summary["selection_reason"] = reason

          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"apply_plan={apply_plan}\n")
              fout.write(f"apply_example_dir={apply_example_dir}\n")

          print(f"Selected upgrade path: {apply_plan} — {reason}")
          PYEOF
      # ── i. Apply head ──────────────────────────────────────────────────────
      # Applies the selected upgrade path (Plan A or Plan B) against live state.
      # Runs by default; set apply_head="false" in dispatch payload to skip.
      - name: Apply head (${{ env.HEAD_REF }})
        id: apply_head
        if: >
          always() &&
          steps.apply_base.outcome == 'success' &&
          steps.select_path.outputs.apply_plan != 'none' &&
          steps.select_path.outputs.apply_plan != '' &&
          env.APPLY_HEAD != 'false'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
          APPLY_EXAMPLE_DIR: ${{ steps.select_path.outputs.apply_example_dir }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$APPLY_EXAMPLE_DIR" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform apply -auto-approve -input=false

      - name: Update summary — apply_head
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.apply_head.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["apply_head"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── j. Idempotency check ───────────────────────────────────────────────
      - name: Idempotency check
        id: idempotency
        if: >
          always() &&
          steps.apply_head.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
          APPLY_EXAMPLE_DIR: ${{ steps.select_path.outputs.apply_example_dir }}
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$APPLY_EXAMPLE_DIR" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform plan -no-color -detailed-exitcode -input=false
          PLAN_EXIT=$?
          set -e

          # Must exit 0 (no changes) after applying head — anything else is non-idempotent
          if [ "$PLAN_EXIT" -ne 0 ]; then
            echo "::error::Idempotency check failed — plan exit code: $PLAN_EXIT"
            exit 1
          fi

      - name: Update summary — idempotency
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.idempotency.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["idempotency"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── i. Destroy ─────────────────────────────────────────────────────────
      - name: Destroy
        id: destroy
        if: always() && steps.apply_base.outcome != 'skipped'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
          APPLY_HEAD_OUTCOME: ${{ steps.apply_head.outcome }}
          SELECT_PATH_DIR: ${{ steps.select_path.outputs.apply_example_dir }}
        run: |
          # If apply_head was attempted (success or failure), use the HEAD workspace that
          # was selected (Plan A or Plan B dir). Partial apply can update state before
          # failing, so always destroy from the workspace that was in use.
          # If apply_head was never run, BASE module created all resources.
          if [ "${APPLY_HEAD_OUTCOME}" != "skipped" ]; then
            WORK_DIR="module-head"
            WORK_EXAMPLE_DIR="${SELECT_PATH_DIR:-$EXAMPLE}"
          else
            WORK_DIR="module-base"
            WORK_EXAMPLE_DIR="$EXAMPLE"
          fi

          if [ ! -d "${WORK_DIR}/examples/${WORK_EXAMPLE_DIR}/.terraform" ]; then
            echo "::warning::No initialised terraform workspace in ${WORK_DIR}/examples/${WORK_EXAMPLE_DIR} — nothing to destroy"
            exit 0
          fi

          echo "Destroying from ${WORK_DIR}/examples/${WORK_EXAMPLE_DIR}"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/${WORK_DIR}:/src" -w "/src/examples/${WORK_EXAMPLE_DIR}" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform destroy -auto-approve -input=false

      - name: Update summary — destroy
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.destroy.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["destroy"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── Finalise summary ────────────────────────────────────────────────────
      - name: Finalise summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json

          with open("summary.json") as f:
              summary = json.load(f)

          steps = summary["steps"]
          failed = [k for k, v in steps.items() if v == "failure"]

          if failed:
              summary["conclusion"] = "failure"
          elif steps["apply_base"] == "success" and steps["destroy"] == "success":
              selected_path = summary.get("selected_upgrade_path", "none")
              plan_a_breaking = summary.get("breaking_changes", [])
              plan_b_destructive = summary.get("plan_b_destructive_changes", [])
              if selected_path == "none" and (plan_a_breaking or plan_b_destructive):
                  summary["conclusion"] = "breaking_change"
              else:
                  summary["conclusion"] = "success"
          else:
              summary["conclusion"] = "failure"

          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          PYEOF

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload upgrade report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upgrade-report-${{ matrix.example.example }}
          path: |
            summary.json
            module-head/examples/${{ matrix.example.example }}_plan_a/plan_a.txt
            module-head/examples/${{ matrix.example.example }}/plan_b.txt
          if-no-files-found: warn

      # ── Fail job if conclusion is failure ───────────────────────────────────
      - name: Check conclusion
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open("summary.json") as f:
              summary = json.load(f)
          if summary.get("conclusion") in ("failure", "breaking_change"):
              print(f"::error::Upgrade test {summary['conclusion'].upper()} — see summary.json for details")
              sys.exit(1)
          print("Upgrade test PASSED")
          PYEOF

      - name: Notify agent on completion
        if: always()
        env:
          CALLBACK_REPO: ${{ github.event.client_payload.callback_repo }}
          AGENT_DISPATCH_TOKEN: ${{ secrets.AGENT_DISPATCH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          FORK_REPO: ${{ env.FORK_REPO }}
          HEAD_REF: ${{ env.HEAD_REF }}
          EXAMPLE: ${{ env.EXAMPLE }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${CALLBACK_REPO}" ]; then
            echo "No callback_repo in payload — skipping callback"
            exit 0
          fi
          if [ -z "${AGENT_DISPATCH_TOKEN}" ]; then
            echo "AGENT_DISPATCH_TOKEN secret not set — skipping callback"
            exit 0
          fi
          payload=$(jq -n \
            --arg status      "$JOB_STATUS" \
            --arg module      "$FORK_REPO" \
            --arg branch      "$HEAD_REF" \
            --arg workflow    "upgrade-test" \
            --arg example     "$EXAMPLE" \
            --arg dispatch_id "$DISPATCH_ID" \
            --arg run_url     "$RUN_URL" \
            '{event_type: "ci-result", client_payload: {status: $status, module: $module, branch: $branch, workflow: $workflow, example: $example, dispatch_id: $dispatch_id, run_url: $run_url}}')
          curl -fsS -X POST \
            -H "Authorization: Bearer $AGENT_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CALLBACK_REPO/dispatches" \
            -d "$payload"
          echo "Notified $CALLBACK_REPO: $JOB_STATUS"
