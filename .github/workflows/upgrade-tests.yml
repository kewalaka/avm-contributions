name: Upgrade tests

# Tests AVM module upgrades: applies the base version, upgrades to the head
# version, and verifies no breaking changes.
#
# Trigger sources
# ──────────────
# repository_dispatch  →  agent-triggered, single module
#
# Dispatch payload (event_type: "module-upgrade"):
#   {
#     "dispatch_id":   "<uuid>",                                     // required
#     "upstream_repo": "Azure/terraform-azurerm-avm-res-<resource>", // informational
#     "fork_repo":     "<owner>/terraform-azurerm-avm-res-<resource>", // required
#     "base_ref":      "v0.4.0",                                     // required
#     "head_ref":      "agent/issue-42-fix-something-abc123",        // required
#     "example":       "default",                                    // optional; blank = all
#     "apply_head":    "true",                                       // optional; default "false"
#     "callback_repo": "<owner>/<repo>"                              // optional
#   }

on:
  repository_dispatch:
    types: [module-upgrade]

concurrency:
  group: upgrade-${{ github.event.client_payload.dispatch_id }}
  cancel-in-progress: false

jobs:
  # ── 1. Discover examples to test ──────────────────────────────────────────
  discover-examples:
    name: Discover examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      examples: ${{ steps.discover.outputs.examples }}
    steps:
      - name: Validate dispatch payload
        env:
          FORK_REPO: ${{ github.event.client_payload.fork_repo }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          BASE_REF: ${{ github.event.client_payload.base_ref }}
          HEAD_REF: ${{ github.event.client_payload.head_ref }}
        run: |
          python3 - << 'PYEOF'
          import os, sys
          ALLOWED_ORGS = {"kewalaka", "Azure"}
          errors = []
          for field in ("DISPATCH_ID", "FORK_REPO", "BASE_REF", "HEAD_REF"):
              if not os.environ.get(field, "").strip():
                  errors.append(f"client_payload.{field.lower()} is required")
          fork_repo = os.environ.get("FORK_REPO", "").strip()
          if fork_repo:
              org = fork_repo.split("/")[0] if "/" in fork_repo else ""
              if org not in ALLOWED_ORGS:
                  errors.append(f"fork_repo org '{org}' is not in allowlist {ALLOWED_ORGS}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"Payload validated: fork_repo={fork_repo}")
          PYEOF

      - name: Checkout ${{ github.event.client_payload.fork_repo }} at ${{ github.event.client_payload.head_ref }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.client_payload.fork_repo }}
          ref: ${{ github.event.client_payload.head_ref }}

      - name: Build example matrix
        id: discover
        env:
          EXAMPLE_INPUT: ${{ github.event.client_payload.example }}
        run: |
          python3 - << 'PYEOF'
          import json, os, glob, sys

          example_input = os.environ.get("EXAMPLE_INPUT", "").strip()
          if example_input:
              examples = [{"example": example_input}]
          else:
              found = sorted(glob.glob("examples/*/main.tf"))
              if not found:
                  print("ERROR: no examples/*/main.tf found", file=sys.stderr)
                  sys.exit(1)
              examples = [{"example": p.split("/")[1]} for p in found]

          result = json.dumps(examples)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"examples={result}\n")
          print(f"Examples to test: {result}")
          PYEOF

  # ── 2. Upgrade test for each example ──────────────────────────────────────
  upgrade-test:
    name: Upgrade — ${{ matrix.example.example }}
    needs: discover-examples
    if: needs.discover-examples.outputs.examples != '[]'
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        example: ${{ fromJson(needs.discover-examples.outputs.examples) }}
      fail-fast: false
    env:
      TF_IN_AUTOMATION: "1"
      TF_VAR_enable_telemetry: "false"
      FORK_REPO: ${{ github.event.client_payload.fork_repo }}
      BASE_REF: ${{ github.event.client_payload.base_ref }}
      HEAD_REF: ${{ github.event.client_payload.head_ref }}
      EXAMPLE: ${{ matrix.example.example }}
      APPLY_HEAD: ${{ github.event.client_payload.apply_head }}
    steps:
      - name: Checkout base (${{ github.event.client_payload.base_ref }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.BASE_REF }}
          path: module-base

      - name: Checkout head (${{ github.event.client_payload.head_ref }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.FORK_REPO }}
          ref: ${{ env.HEAD_REF }}
          path: module-head

      # Fetches an OIDC request token that the AVM Docker container uses to
      # exchange for an Azure access token at runtime.
      - name: Obtain OIDC credential helper
        run: |
          export REMOTE_SCRIPT="https://raw.githubusercontent.com/Azure/tfmod-scaffold/main/avm_scripts"
          curl -H 'Cache-Control: no-cache, no-store' -sSL \
            "$REMOTE_SCRIPT/prepare-credential.sh" -o "$RUNNER_TEMP/prepare-credential.sh"
          source "$RUNNER_TEMP/prepare-credential.sh"
          echo "ARM_OIDC_REQUEST_TOKEN=$ARM_OIDC_REQUEST_TOKEN" >> "$GITHUB_ENV"
          echo "ARM_OIDC_REQUEST_URL=$ARM_OIDC_REQUEST_URL"   >> "$GITHUB_ENV"
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_USE_OIDC: "true"

      - name: Initialise summary.json
        run: |
          python3 - << 'PYEOF'
          import json, os
          summary = {
              "example":  os.environ["EXAMPLE"],
              "base_ref": os.environ["BASE_REF"],
              "head_ref": os.environ["HEAD_REF"],
              "steps": {
                  "apply_base":   "skipped",
                  "plan_upgrade": "skipped",
                  "apply_head":   "skipped",
                  "idempotency":  "skipped",
                  "destroy":      "skipped",
              },
              "breaking_changes": [],
              "conclusion": "failure",
          }
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print("Initialised summary.json")
          PYEOF

      # ── a. Apply base ──────────────────────────────────────────────────────
      - name: Apply base (${{ env.BASE_REF }})
        id: apply_base
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-base:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            sh -c 'terraform init -input=false && terraform apply -auto-approve -input=false'

      - name: Update summary — apply_base
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.apply_base.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["apply_base"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── b. Copy state to head checkout ─────────────────────────────────────
      - name: Copy terraform state to head checkout
        if: steps.apply_base.outcome == 'success'
        run: |
          STATE_SRC="module-base/examples/$EXAMPLE/terraform.tfstate"
          STATE_DST="module-head/examples/$EXAMPLE"
          mkdir -p "$STATE_DST"
          if [ -f "$STATE_SRC" ]; then
            cp "$STATE_SRC" "$STATE_DST/terraform.tfstate"
            echo "Copied terraform.tfstate to head checkout"
          else
            echo "::warning::No terraform.tfstate found after apply_base"
          fi

      # ── c. Init upgrade ─────────────────────────────────────────────────────
      - name: Init upgrade (${{ env.HEAD_REF }})
        id: init_upgrade
        if: steps.apply_base.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform init -upgrade -input=false

      # ── d. Plan upgrade ─────────────────────────────────────────────────────
      - name: Plan upgrade
        id: plan_upgrade
        if: steps.apply_base.outcome == 'success' && steps.init_upgrade.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform plan -detailed-exitcode -input=false \
            2>&1 | tee "module-head/examples/$EXAMPLE/plan.txt"
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e

          # terraform plan -detailed-exitcode: 0=no changes, 1=error, 2=changes present
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "plan_status=no_changes" >> "$GITHUB_OUTPUT"
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "plan_status=changes" >> "$GITHUB_OUTPUT"
          else
            echo "plan_status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ── e. Check for breaking changes ──────────────────────────────────────
      - name: Check for breaking changes
        if: >
          steps.plan_upgrade.outcome == 'success' &&
          steps.plan_upgrade.outputs.plan_status == 'changes'
        run: |
          python3 - << 'PYEOF'
          import json, re, os

          example = os.environ["EXAMPLE"]
          plan_file = f"module-head/examples/{example}/plan.txt"

          breaking = []
          if os.path.exists(plan_file):
              with open(plan_file) as f:
                  content = f.read()
              lines = content.split("\n")
              for i, line in enumerate(lines):
                  stripped = line.strip()
                  # A pure destroy shows "# <resource> will be destroyed"
                  if re.search(r'will be destroyed\s*$', stripped):
                      context = "\n".join(lines[max(0, i - 5):i + 5])
                      if "must be replaced" not in context and "will be replaced" not in context:
                          resource = stripped.lstrip("#").strip().split()[0] if stripped else "unknown"
                          breaking.append(resource)

          with open("summary.json") as f:
              summary = json.load(f)
          summary["breaking_changes"] = breaking
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          if breaking:
              print(f"::warning::Found {len(breaking)} unexpected resource destroy(s): {breaking}")
          else:
              print("No unexpected resource destroys detected.")
          PYEOF

      - name: Update summary — plan_upgrade
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.plan_upgrade.outcome }}
          PLAN_STATUS: ${{ steps.plan_upgrade.outputs.plan_status }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          plan_status = os.environ.get("PLAN_STATUS", "")
          if outcome == "skipped":
              status = "skipped"
          elif outcome != "success":
              status = "failure"
          elif plan_status == "no_changes":
              status = "no_changes"
          else:
              status = "success"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["plan_upgrade"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── f. Apply head (optional) ───────────────────────────────────────────
      - name: Apply head (${{ env.HEAD_REF }})
        id: apply_head
        if: >
          steps.apply_base.outcome == 'success' &&
          steps.plan_upgrade.outcome == 'success' &&
          env.APPLY_HEAD == 'true'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform apply -auto-approve -input=false

      - name: Update summary — apply_head
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.apply_head.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["apply_head"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── g. Idempotency check ───────────────────────────────────────────────
      - name: Idempotency check
        id: idempotency
        if: >
          steps.apply_base.outcome == 'success' &&
          steps.plan_upgrade.outcome == 'success' &&
          env.APPLY_HEAD == 'true' &&
          steps.apply_head.outcome == 'success'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/module-head:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform plan -detailed-exitcode -input=false
          PLAN_EXIT=$?
          set -e

          # Must exit 0 (no changes) after applying head — anything else is non-idempotent
          if [ "$PLAN_EXIT" -ne 0 ]; then
            echo "::error::Idempotency check failed — plan exit code: $PLAN_EXIT"
            exit 1
          fi

      - name: Update summary — idempotency
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.idempotency.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["idempotency"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── h. Destroy ─────────────────────────────────────────────────────────
      - name: Destroy
        id: destroy
        if: always() && steps.apply_base.outcome != 'skipped'
        shell: bash
        env:
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_TENANT_ID_OVERRIDE: ${{ secrets.ARM_TENANT_ID_OVERRIDE }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_SUBSCRIPTION_ID_OVERRIDE: ${{ secrets.ARM_SUBSCRIPTION_ID_OVERRIDE }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_ID_OVERRIDE: ${{ secrets.ARM_CLIENT_ID_OVERRIDE }}
          ARM_USE_OIDC: "true"
        run: |
          # Prefer destroying from the head checkout (has latest state); fall back to base
          if [ -f "module-head/examples/$EXAMPLE/terraform.tfstate" ] && \
             [ -d "module-head/examples/$EXAMPLE/.terraform" ]; then
            WORK_DIR="module-head"
          elif [ -f "module-base/examples/$EXAMPLE/terraform.tfstate" ] && \
               [ -d "module-base/examples/$EXAMPLE/.terraform" ]; then
            WORK_DIR="module-base"
          else
            echo "::warning::No initialised terraform workspace found — nothing to destroy"
            exit 0
          fi
          echo "Destroying from $WORK_DIR"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd)/$WORK_DIR:/src" -w "/src/examples/$EXAMPLE" \
            --network=host \
            -e TF_IN_AUTOMATION \
            -e TF_VAR_enable_telemetry \
            -e AVM_MOD_PATH=/src \
            -e ARM_SUBSCRIPTION_ID \
            -e ARM_TENANT_ID \
            -e ARM_CLIENT_ID \
            -e ARM_OIDC_REQUEST_TOKEN \
            -e ARM_OIDC_REQUEST_URL \
            -e ARM_USE_OIDC \
            --env-file <(env | grep '^TF_VAR_' | grep -v ' "TF_VAR_') \
            mcr.microsoft.com/azterraform:avm-latest \
            terraform destroy -auto-approve -input=false

      - name: Update summary — destroy
        if: always()
        env:
          STEP_OUTCOME: ${{ steps.destroy.outcome }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          outcome = os.environ.get("STEP_OUTCOME", "skipped")
          if outcome == "success":
              status = "success"
          elif outcome == "skipped":
              status = "skipped"
          else:
              status = "failure"
          with open("summary.json") as f:
              summary = json.load(f)
          summary["steps"]["destroy"] = status
          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      # ── Finalise summary ────────────────────────────────────────────────────
      - name: Finalise summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json

          with open("summary.json") as f:
              summary = json.load(f)

          steps = summary["steps"]
          failed = [k for k, v in steps.items() if v == "failure"]

          if failed:
              summary["conclusion"] = "failure"
          elif steps["apply_base"] == "success" and steps["destroy"] == "success":
              summary["conclusion"] = "success"
          else:
              summary["conclusion"] = "failure"

          with open("summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          print(json.dumps(summary, indent=2))
          PYEOF

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload upgrade report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upgrade-report-${{ matrix.example.example }}
          path: |
            summary.json
            module-head/examples/${{ matrix.example.example }}/plan.txt
          if-no-files-found: warn

      # ── Fail job if conclusion is failure ───────────────────────────────────
      - name: Check conclusion
        if: always()
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open("summary.json") as f:
              summary = json.load(f)
          if summary.get("conclusion") == "failure":
              print("::error::Upgrade test FAILED — see summary.json for details")
              sys.exit(1)
          print("Upgrade test PASSED")
          PYEOF

      - name: Notify agent on completion
        if: always()
        env:
          CALLBACK_REPO: ${{ github.event.client_payload.callback_repo }}
          AGENT_DISPATCH_TOKEN: ${{ secrets.AGENT_DISPATCH_TOKEN }}
          JOB_STATUS: ${{ job.status }}
          FORK_REPO: ${{ env.FORK_REPO }}
          HEAD_REF: ${{ env.HEAD_REF }}
          EXAMPLE: ${{ env.EXAMPLE }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${CALLBACK_REPO}" ]; then
            echo "No callback_repo in payload — skipping callback"
            exit 0
          fi
          if [ -z "${AGENT_DISPATCH_TOKEN}" ]; then
            echo "AGENT_DISPATCH_TOKEN secret not set — skipping callback"
            exit 0
          fi
          payload=$(jq -n \
            --arg status      "$JOB_STATUS" \
            --arg module      "$FORK_REPO" \
            --arg branch      "$HEAD_REF" \
            --arg workflow    "upgrade-test" \
            --arg example     "$EXAMPLE" \
            --arg dispatch_id "$DISPATCH_ID" \
            --arg run_url     "$RUN_URL" \
            '{event_type: "ci-result", client_payload: {status: $status, module: $module, branch: $branch, workflow: $workflow, example: $example, dispatch_id: $dispatch_id, run_url: $run_url}}')
          curl -fsS -X POST \
            -H "Authorization: Bearer $AGENT_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$CALLBACK_REPO/dispatches" \
            -d "$payload"
          echo "Notified $CALLBACK_REPO: $JOB_STATUS"
